name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}

    permissions:
      contents: read
      packages: write       # push the rolling image to GHCR
      id-token: write        # build provenance attestation

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: Fedora
            os: ubuntu-latest
            container: fedora:latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Install Fedora dependencies
        if: matrix.name == 'Fedora'
        run: |
          dnf install -y \
            git curl \
            gcc gcc-c++ \
            meson ninja-build \
            llvm-devel \
            python3-pip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.name != 'Fedora'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        if: matrix.name != 'Fedora'
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: matrix.name == 'Ubuntu'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvm_version = "20.1.8"
          $installer = "LLVM-${llvm_version}-win64.exe"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${llvm_version}/${installer}"
          curl -L -o $installer $url
          Start-Process -Wait -FilePath ".\$installer" -ArgumentList "/S"

      - name: Configure (release)
        run: meson setup build/ --buildtype=release

      - name: Configure (debug)
        run: meson setup build-debug/ --buildtype=debug

      - name: Build (release)
        run: meson compile -C build/

      - name: Build (debug)
        run: meson compile -C build-debug/

      - name: Smoke test
        run: ./build/luma --help || true

      # ── Publish a rolling GHCR image from main (Linux only) ────────────────
      # Runs only after the build + smoke test pass, only on pushes to main.
      # The playground pulls ghcr.io/<owner>/luma:latest to track main.
      - name: Package runtime (bundle shared-lib deps + std)
        if: matrix.name == 'Ubuntu' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          sudo apt-get install -y patchelf
          rm -rf staging && mkdir -p staging
          cp build/luma staging/

          # Libs the runtime base image (debian-slim + libstdc++6) already provides.
          is_base() {
            case "$1" in
              libc.so.6|libm.so.6|libdl.so.2|libpthread.so.0|librt.so.1|libresolv.so.2|\
              libstdc++.so.6|libgcc_s.so.1|ld-linux-*|linux-vdso.so.*) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Bundle the FULL transitive closure of luma's shared-lib deps (libLLVM,
          # libtinfo, libz, libzstd, libxml2, ...) next to the binary with an
          # $ORIGIN rpath, so the image only needs the base libs above.
          DEPS=$(mktemp)
          ldd build/luma | grep -E '=> /' | sed 's/.*=> //; s/ (.*//' \
            | while read -r p; do is_base "$(basename "$p")" || echo "$p"; done | sort -u > "$DEPS"

          idx=0
          while true; do
            cur=$(sed -n "$((idx+1))p" "$DEPS"); [ -z "$cur" ] && break
            ldd "$cur" 2>/dev/null | grep -E '=> /' | sed 's/.*=> //; s/ (.*//' | while read -r p; do
              is_base "$(basename "$p")" && continue
              grep -qF "$p" "$DEPS" || echo "$p" >> "$DEPS"
            done
            idx=$((idx+1))
          done

          while IFS= read -r dep; do cp -L "$dep" "staging/$(basename "$dep")"; done < "$DEPS"
          while IFS= read -r dep; do
            b=$(basename "$dep"); [ -f "staging/$b" ] && patchelf --set-rpath '$ORIGIN' "staging/$b" || true
          done < "$DEPS"
          patchelf --set-rpath '$ORIGIN' staging/luma
          rm "$DEPS"

          mkdir -p staging/std && cp -r std/* staging/std/

          # Verify the bundle resolves with only $ORIGIN (cwd == $ORIGIN here).
          echo "=== ldd staging/luma ==="
          ( cd staging && ldd ./luma || true )
          if ( cd staging && ldd ./luma 2>&1 | grep -q 'not found' ); then
            echo "ERROR: unresolved libraries in bundle (see above)"; exit 1
          fi

      - name: Set up Docker Buildx
        if: matrix.name == 'Ubuntu' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: matrix.name == 'Ubuntu' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        if: matrix.name == 'Ubuntu' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/luma" >> "$GITHUB_ENV"

      - name: Build and push rolling image
        if: matrix.name == 'Ubuntu' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          provenance: mode=max
          sbom: true