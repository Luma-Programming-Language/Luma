name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: Fedora
            os: ubuntu-latest
            container: fedora:latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Install Fedora dependencies
        if: matrix.name == 'Fedora'
        run: |
          dnf install -y \
            git curl \
            gcc gcc-c++ \
            meson ninja-build \
            llvm-devel \
            python3-pip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.name != 'Fedora'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        if: matrix.name != 'Fedora'
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: matrix.name == 'Ubuntu'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
            choco install llvm -y
            # Find where llvm-config actually landed
            $llvmConfig = Get-ChildItem "C:\Program Files" -Recurse -Name "llvm-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($llvmConfig) {
              $llvmBin = Split-Path (Join-Path "C:\Program Files" $llvmConfig)
              Write-Host "Found llvm-config at: $llvmBin"
              Add-Content $env:GITHUB_PATH $llvmBin
            } else {
              # Also check C:\LLVM which is another common choco install location
              $llvmConfig2 = Get-ChildItem "C:\" -Recurse -Depth 4 -Name "llvm-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($llvmConfig2) {
                $llvmBin2 = Split-Path (Join-Path "C:\" $llvmConfig2)
                Write-Host "Found llvm-config at: $llvmBin2"
                Add-Content $env:GITHUB_PATH $llvmBin2
              } else {
                Write-Error "llvm-config.exe not found anywhere"
                exit 1
              }
            }
      - name: Configure (release)
        run: meson setup build/ --buildtype=release

      - name: Configure (debug)
        run: meson setup build-debug/ --buildtype=debug

      - name: Build (release)
        run: meson compile -C build/

      - name: Build (debug)
        run: meson compile -C build-debug/

      - name: Smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./build/luma.exe --help || true
          else
            ./build/luma --help || true
          fi