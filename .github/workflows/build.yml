name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: Fedora
            os: ubuntu-latest
            container: fedora:latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Install Fedora dependencies
        if: matrix.name == 'Fedora'
        run: |
          dnf install -y \
            git curl \
            gcc gcc-c++ \
            meson ninja-build \
            llvm-devel \
            python3-pip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.name != 'Fedora'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        if: matrix.name != 'Fedora'
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: matrix.name == 'Ubuntu'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvm_version = "20.1.8"
          $installer = "LLVM-${llvm_version}-win64.exe"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${llvm_version}/${installer}"
          curl -L -o $installer $url
          Start-Process -Wait -FilePath ".\$installer" -ArgumentList "/S"

      - name: Configure (release)
        run: meson setup build/ --buildtype=release

      - name: Configure (debug)
        run: meson setup build-debug/ --buildtype=debug

      - name: Build (release)
        run: meson compile -C build/

      - name: Build (debug)
        run: meson compile -C build-debug/

      - name: Smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./build/luma.exe --help || true
          else
            ./build/luma --help || true
          fi