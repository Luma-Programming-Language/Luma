name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Configure
        run: meson setup build/ --buildtype=release

      - name: Build
        run: meson compile -C build/

      - name: Set archive name
        shell: bash
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "ARCHIVE=luma-${VER}-linux-x86_64.tar.gz" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "ARCHIVE=luma-${VER}-macos.tar.gz" >> $GITHUB_ENV
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp build/luma staging/
          cp -r std/ staging/
          cp docs/README.md docs/INSTALL.md staging/
          tar czf "$ARCHIVE" -C staging .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp build/luma staging/
          cp -r std/ staging/
          cp docs/README.md docs/INSTALL.md staging/
          tar czf "$ARCHIVE" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luma-${{ github.event.inputs.version }}-${{ runner.os }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Luma ${{ github.event.inputs.version }}
          body_path: docs/releases/release-${{ github.event.inputs.version }}.md
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
