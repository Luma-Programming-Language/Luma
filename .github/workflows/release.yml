name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev patchelf
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Configure
        run: meson setup build/ --buildtype=release

      - name: Build
        run: meson compile -C build/

      - name: Set archive name
        shell: bash
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "ARCHIVE=luma-${VER}-linux-x86_64.tar.gz" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "ARCHIVE=luma-${VER}-macos.tar.gz" >> $GITHUB_ENV
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp build/luma staging/

          LLVM_SO=$(ldd build/luma | grep LLVM | sed 's/.*=> //' | sed 's/ (.*)//' | head -1)

          if [ -n "$LLVM_SO" ]; then
            DEPS_FILE=$(mktemp)
            echo "$LLVM_SO" > "$DEPS_FILE"

            # Iteratively discover all transitive .so deps via ldd
            idx=0
            while true; do
              current=$(sed -n "$((idx+1))p" "$DEPS_FILE" 2>/dev/null)
              [ -z "$current" ] && break
              while IFS= read -r dep; do
                dep_path=$(echo "$dep" | sed 's/.*=> //' | sed 's/ (.*)//')
                dep_name=$(basename "$dep_path")
                case "$dep_name" in
                  libc.so.6|libm.so.6|libstdc++.so.6|libgcc_s.so.1|ld-linux-*|linux-vdso.so.*)
                    continue ;;
                esac
                if ! grep -qF "$dep_path" "$DEPS_FILE" 2>/dev/null; then
                  echo "$dep_path" >> "$DEPS_FILE"
                fi
              done < <(ldd "$current" 2>/dev/null | grep -E '=> /')
              idx=$((idx+1))
            done

            # Copy all deps to staging
            while IFS= read -r dep; do
              cp -L "$dep" "staging/$(basename "$dep")"
            done < "$DEPS_FILE"

            # Set $ORIGIN rpath on all bundled .so so transitive deps resolve locally
            while IFS= read -r dep; do
              base=$(basename "$dep")
              if [ -f "staging/$base" ]; then
                patchelf --set-rpath '$ORIGIN' "staging/$base" 2>/dev/null || true
              fi
            done < "$DEPS_FILE"

            rm "$DEPS_FILE"
          fi

          mkdir -p staging/std
          cp -r std/* staging/std/
          cp docs/README.md docs/INSTALL.md staging/
          tar czf "$ARCHIVE" -C staging .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Collect LLVM dylib and all its transitive Homebrew deps
          LLVM_DYLIB=$(otool -L build/luma | grep LLVM | awk '{print $1}' | head -1)

          mkdir -p staging
          cp build/luma staging/

          if [ -n "$LLVM_DYLIB" ]; then
            DEPS_FILE=$(mktemp)
            echo "$LLVM_DYLIB" > "$DEPS_FILE"

            # Iteratively discover all transitive Homebrew dylib deps
            idx=0
            while true; do
              current=$(sed -n "$((idx+1))p" "$DEPS_FILE" 2>/dev/null)
              [ -z "$current" ] && break
              for dep in $(otool -L "$current" 2>/dev/null | grep -E '^\s+/(opt/homebrew|usr/local)/' | awk '{print $1}'); do
                if ! grep -qF "$dep" "$DEPS_FILE" 2>/dev/null; then
                  echo "$dep" >> "$DEPS_FILE"
                fi
              done
              idx=$((idx+1))
            done

            # Copy all deps to staging
            while IFS= read -r dep; do
              cp -L "$dep" "staging/$(basename "$dep")"
            done < "$DEPS_FILE"

            # Fix binary references to use @executable_path
            while IFS= read -r dep; do
              dylib_base=$(basename "$dep")
              install_name_tool -change "$dep" "@executable_path/$dylib_base" staging/luma
            done < "$DEPS_FILE"

            # Fix cross-references between bundled dylibs
            while IFS= read -r dep; do
              base=$(basename "$dep")
              if [ -f "staging/$base" ]; then
                while IFS= read -r other; do
                  other_base=$(basename "$other")
                  if [ "$other" != "$dep" ]; then
                    install_name_tool -change "$other" "@executable_path/$other_base" "staging/$base" 2>/dev/null || true
                  fi
                done < "$DEPS_FILE"
              fi
            done < "$DEPS_FILE"

            rm "$DEPS_FILE"
          fi

          mkdir -p staging/std
          cp -r std/* staging/std/
          cp docs/README.md docs/INSTALL.md staging/
          tar czf "$ARCHIVE" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luma-${{ github.event.inputs.version }}-${{ runner.os }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Luma ${{ github.event.inputs.version }}
          body_path: docs/releases/release-${{ github.event.inputs.version }}.md
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
