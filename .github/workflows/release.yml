name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson & Ninja
        run: pip install meson ninja

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          git clone https://github.com/llvm/llvm-project.git
          cmake -S llvm-project/llvm -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLLVM_ENABLE_PROJECTS="clang;lld" -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DCMAKE_ASM_COMPILER=gcc
          ninja -C build -j $(nproc)
          echo "$(cygpath -w $(pwd))/build/bin" >> $GITHUB_PATH
          echo "$(cygpath -w /mingw64)/bin" >> $GITHUB_PATH

      - name: Configure
        run: meson setup build/ --buildtype=release

      - name: Build
        run: meson compile -C build/

      - name: Set archive name
        shell: bash
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "ARCHIVE=luma-${VER}-linux-x86_64.tar.gz" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "ARCHIVE=luma-${VER}-macos.tar.gz" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "Windows" ]; then
            echo "ARCHIVE=luma-${VER}-windows-x86_64.zip" >> $GITHUB_ENV
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp build/luma staging/
          cp -r std/ staging/
          cp README.md LICENSE docs/INSTALL.md staging/
          tar czf "$ARCHIVE" -C staging .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp build/luma staging/
          cp -r std/ staging/
          cp README.md LICENSE docs/INSTALL.md staging/
          tar czf "$ARCHIVE" -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging
          Copy-Item build/luma.exe staging/
          Copy-Item -Recurse std/ staging/
          Copy-Item README.md, LICENSE, docs/INSTALL.md staging/
          Compress-Archive -Path staging\* -DestinationPath $env:ARCHIVE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luma-${{ github.event.inputs.version }}-${{ runner.os }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Luma ${{ github.event.inputs.version }}
          body_path: docs/releases/release-${{ github.event.inputs.version }}.md
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
